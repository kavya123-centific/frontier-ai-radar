version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # LLM Provider (OpenRouter recommended)
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      # Anthropic native (alternative)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Email — Resend (recommended)
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM=${RESEND_FROM:-AI Radar <onboarding@resend.dev>}
      # Email — SMTP fallback
      - SMTP_EMAIL=${SMTP_EMAIL:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      # System
      - CONFIG_PATH=/app/config.yaml
      - DATABASE_URL=sqlite:////data/radar.db
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - radar_data:/data
      - radar_digests:/app/digests
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: python:3.11-slim
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./frontend:/app/frontend
      - ./backend/requirements.txt:/tmp/requirements.txt
    command: >
      bash -c "pip install streamlit requests pandas -q &&
               streamlit run /app/frontend/streamlit_app.py
               --server.port 8501
               --server.address 0.0.0.0
               --server.headless true
               --browser.gatherUsageStats false"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  radar_data:
  radar_digests:
